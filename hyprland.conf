# ── Monitor ──────────────────────────────────────────────────────────────────
# "preferred" picks your display's native resolution and refresh rate.
# "auto" positions it automatically. "1" = 1× scale (no HiDPI scaling).
monitor = , preferred, auto, 1

# ── Startup ───────────────────────────────────────────────────────────────────
exec-once = qs -p ~/dev/shell/shell.qml   # Start the shell
exec-once = swww-daemon                   # Start wallpaper daemon (if installed)

# ── General ───────────────────────────────────────────────────────────────────
general {
    gaps_in             = 4
    gaps_out            = 8
    border_size         = 1
    col.active_border   = rgba(c8b3faee)
    col.inactive_border = rgba(3a3a3a66)
    layout              = dwindle
    resize_on_border    = true
}

# ── Decoration ────────────────────────────────────────────────────────────────
decoration {
    rounding = 6

    blur {
        enabled  = true
        size     = 5
        passes   = 2
        vibrancy = 0.18
    }

    # Window shadows
    shadow {
        enabled  = true
        range    = 12
        render_power = 3
        color    = rgba(00000066)
    }
}

# ── Animations ────────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = snappy,  0.23, 1.00, 0.32, 1.00
    bezier = linear,  0.00, 0.00, 1.00, 1.00

    animation = windows,        1, 3,  snappy, slide
    animation = windowsOut,     1, 3,  snappy, slide
    animation = windowsMove,    1, 3,  snappy
    animation = workspaces,     1, 4,  snappy, slidevert
    animation = fade,           1, 4,  linear
}

# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout   = us          # Change to your keyboard layout
    follow_mouse = 1

    touchpad {
        natural_scroll  = true
        tap-to-click    = true
    }
}

# ── Misc ──────────────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    focus_on_activate       = true
}

# ── Dwindle layout ────────────────────────────────────────────────────────────
dwindle {
    pseudotile          = true
    preserve_split      = true
}

# ═══════════════════════════════════════════════════════════════════════════════
#  K E Y B I N D S
# ═══════════════════════════════════════════════════════════════════════════════
$mod = SUPER

# App launcher (calls toggle on the shell via Quickshell IPC)
bind = $mod,       Space,   exec, qs ipc call shell toggleLauncher

# Wallpaper picker (opens zenity file dialog → sets wallpaper → runs matugen)
bind = $mod,       W,       exec, ~/dev/shell/scripts/wallpaper.sh

# Terminal — change "kitty" to your preferred terminal (kitty, alacritty, etc.)
bind = $mod,       Return,  exec, kitty
bind = $mod,       T,       exec, kitty

# Window management
bind = $mod,       Q,       killactive
bind = $mod,       V,       togglefloating
bind = $mod,       F,       fullscreen, 0
bind = $mod SHIFT, F,       fullscreen, 1    # Maximized (keeps bar visible)

# Exit Hyprland (back to GNOME)
bind = $mod SHIFT, E,       exit

# Focus movement (vim-style)
bind = $mod,       H,       movefocus, l
bind = $mod,       L,       movefocus, r
bind = $mod,       K,       movefocus, u
bind = $mod,       J,       movefocus, d

# Arrow key focus (alternative)
bind = $mod,       left,    movefocus, l
bind = $mod,       right,   movefocus, r
bind = $mod,       up,      movefocus, u
bind = $mod,       down,    movefocus, d

# Move windows
bind = $mod SHIFT, H,       movewindow, l
bind = $mod SHIFT, L,       movewindow, r
bind = $mod SHIFT, K,       movewindow, u
bind = $mod SHIFT, J,       movewindow, d

# Workspaces 1-5
bind = $mod,       1,       workspace, 1
bind = $mod,       2,       workspace, 2
bind = $mod,       3,       workspace, 3
bind = $mod,       4,       workspace, 4
bind = $mod,       5,       workspace, 5

# Move active window to workspace
bind = $mod SHIFT, 1,       movetoworkspace, 1
bind = $mod SHIFT, 2,       movetoworkspace, 2
bind = $mod SHIFT, 3,       movetoworkspace, 3
bind = $mod SHIFT, 4,       movetoworkspace, 4
bind = $mod SHIFT, 5,       movetoworkspace, 5

# Scroll through workspaces with mouse wheel on the bar area
bind = $mod,       mouse_down, workspace, e+1
bind = $mod,       mouse_up,   workspace, e-1

# Mouse window management
bindm = $mod,      mouse:272,  movewindow
bindm = $mod,      mouse:273,  resizewindow

# ── Window rules ─────────────────────────────────────────────────────────────
# Float common dialog windows
windowrule = float, title:^(Open|Save|Open File|Save File|Save As)(.*)$
windowrule = float, class:^(zenity)$
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(nm-connection-editor)$
