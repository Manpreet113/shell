# ═══════════════════════════════════════════════════════════════════════════════
#  K E Y B I N D S
# ═══════════════════════════════════════════════════════════════════════════════
$mod = SUPER

# App launcher (calls toggle on the shell via Quickshell IPC)
bind = $mod,       Space,   exec, qs -p ~/.config/quickshell ipc call shell toggleLauncher

# Wallpaper picker
bind = $mod,       W,       exec, qs -p ~/.config/quickshell ipc call shell toggleWallpaperSelector

# Essential Apps
bind = $mod,       Return,  exec, kitty
bind = $mod,       T,       exec, kitty
bind = $mod,       B,       exec, xdg-open "https://google.com"
bind = $mod,       E,       exec, thunar

# Shell Management
bind = $mod SHIFT, R,       exec, killall qs; qs -p ~/.config/quickshell --daemonize

# Window management
bind = $mod,       Q,       killactive
bind = $mod SHIFT, V,       togglefloating
bind = $mod,       F,       fullscreen, 0
bind = $mod SHIFT, F,       fullscreen, 1

# Clipboard history
bind = $mod,       V,       exec, kitty --class clipse -e clipse

# Screenshots (requires grimblast)
bind = ,           Print,   exec, grimblast copy area
bind = SHIFT,      Print,   exec, grimblast copy screen
bind = $mod,       Print,   exec, grimblast save area

# Media / System Keys
bindel = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Exit
bind = $mod SHIFT, E,       exit

# Focus movement (Scrolling Layout)
bind = $mod,       H,       layoutmsg, focus l
bind = $mod,       L,       layoutmsg, focus r
bind = $mod,       K,       workspace, e+1
bind = $mod,       J,       workspace, e-1

# Arrow key focus (Standard)
bind = $mod,       left,    movefocus, l
bind = $mod,       right,   movefocus, r
bind = $mod,       up,      movefocus, u
bind = $mod,       down,    movefocus, d

# Move windows
bind = $mod SHIFT, H,       movewindow, l
bind = $mod SHIFT, L,       movewindow, r
bind = $mod SHIFT, K,       movewindow, u
bind = $mod SHIFT, J,       movewindow, d

# Workspaces 1-10
bind = $mod,       1,       workspace, 1
bind = $mod,       2,       workspace, 2
bind = $mod,       3,       workspace, 3
bind = $mod,       4,       workspace, 4
bind = $mod,       5,       workspace, 5
bind = $mod,       6,       workspace, 6
bind = $mod,       7,       workspace, 7
bind = $mod,       8,       workspace, 8
bind = $mod,       9,       workspace, 9
bind = $mod,       0,       workspace, 10

# Move active window to workspace
bind = $mod SHIFT, 1,       movetoworkspace, 1
bind = $mod SHIFT, 2,       movetoworkspace, 2
bind = $mod SHIFT, 3,       movetoworkspace, 3
bind = $mod SHIFT, 4,       movetoworkspace, 4
bind = $mod SHIFT, 5,       movetoworkspace, 5
bind = $mod SHIFT, 6,       movetoworkspace, 6
bind = $mod SHIFT, 7,       movetoworkspace, 7
bind = $mod SHIFT, 8,       movetoworkspace, 8
bind = $mod SHIFT, 9,       movetoworkspace, 9
bind = $mod SHIFT, 0,       movetoworkspace, 10

# Scroll through workspaces
bind = $mod,       mouse_down, workspace, e+1
bind = $mod,       mouse_up,   workspace, e-1

# Mouse window management
bindm = $mod,      mouse:272,  movewindow
bindm = $mod,      mouse:273,  resizewindow
