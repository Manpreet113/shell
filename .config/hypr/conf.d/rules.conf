# ── Window rules ─────────────────────────────────────────────────────────────
windowrule = float on, match:title ^(Open|Save|Open File|Save File|Save As)(.*)$
windowrule = float on, match:class ^(zenity)$
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$

# Clipboard manager (clipse)
windowrule = float on, match:class (clipse)
windowrule = size 622 652, match:class (clipse)

# ── Quickshell / Layer Shell rules ──────────────────────────────────────────
# Ensure the bar doesn't get focus normally unless it's a launcher
# (Quickshell handles this but these rules can be extra insurance)
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0.5, match:namespace quickshell
