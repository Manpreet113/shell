# ── Window rules ─────────────────────────────────────────────────────────────
windowrule = float, title:^(Open|Save|Open File|Save File|Save As)(.*)$
windowrule = float, class:^(zenity)$
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(nm-connection-editor)$

# Clipboard manager (clipse)
windowrulev2 = float, class:(clipse)
windowrulev2 = size 622 652, class:(clipse)

# ── Quickshell / Layer Shell rules ──────────────────────────────────────────
# Ensure the bar doesn't get focus normally unless it's a launcher
# (Quickshell handles this but these rules can be extra insurance)
layerrule = blur, quickshell
layerrule = ignorealpha 0.5, quickshell
