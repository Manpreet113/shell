$mono = JetBrains Mono Nerd Font
$ui = Inter

general {
    hide_cursor = false
    immediate_render = true
}

animations {
    enabled = true
    bezier = ease, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 5, ease
    animation = fadeOut, 1, 4, ease
    animation = inputFieldDots, 1, 2, ease
}

background {
    monitor =
    path = screenshot
    blur_passes = 5
    blur_size = 9
    noise = 0.015
    brightness = 0.76
    contrast = 1.12
    vibrancy = 0.22
}

shape {
    monitor =
    size = 560, 350
    color = rgba(10, 12, 14, 0.70)
    rounding = 34
    border_size = 1
    border_color = rgba(255, 255, 255, 0.10)
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = SECURE
    color = rgba(203, 213, 219, 0.86)
    font_size = 11
    font_family = $mono
    position = 0, 92
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.95)
    font_size = 60
    font_family = $ui
    position = 0, 34
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(190, 198, 201, 0.76)
    font_size = 15
    font_family = $ui
    position = 0, -12
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 58
    outline_thickness = 2
    inner_color = rgba(255, 255, 255, 0.03)
    outer_color = rgba(210, 221, 224, 0.14)
    check_color = rgba(168, 199, 250, 0.92)
    fail_color = rgba(255, 180, 171, 0.9)
    font_color = rgba(255, 255, 255, 0.92)
    fade_on_empty = false
    rounding = 30
    font_family = $mono
    placeholder_text = Password
    fail_text = $PAMFAIL
    dots_spacing = 0.25
    dots_center = true
    position = 0, -98
    halign = center
    valign = center
}
