$mono = JetBrains Mono Nerd Font
$ui = Inter

general {
    hide_cursor = false
    immediate_render = true
}

animations {
    enabled = true
    bezier = ease, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 5, ease
    animation = fadeOut, 1, 4, ease
    animation = inputFieldDots, 1, 2, ease
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.02
    brightness = 0.82
    contrast = 1.08
    vibrancy = 0.18
}

shape {
    monitor =
    size = 520, 320
    color = rgba(12, 15, 16, 0.78)
    rounding = 30
    border_size = 1
    border_color = rgba(255, 255, 255, 0.08)
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = SECURE
    color = rgba(200, 210, 212, 0.88)
    font_size = 12
    font_family = $mono
    position = 0, 82
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.95)
    font_size = 56
    font_family = $ui
    position = 0, 28
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(190, 198, 201, 0.7)
    font_size = 16
    font_family = $ui
    position = 0, -18
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    inner_color = rgba(255, 255, 255, 0.02)
    outer_color = rgba(210, 221, 224, 0.12)
    check_color = rgba(168, 199, 250, 0.85)
    fail_color = rgba(255, 180, 171, 0.9)
    font_color = rgba(255, 255, 255, 0.92)
    fade_on_empty = false
    rounding = 28
    font_family = $mono
    placeholder_text = Password
    fail_text = $PAMFAIL
    dots_spacing = 0.22
    dots_center = true
    position = 0, -86
    halign = center
    valign = center
}
