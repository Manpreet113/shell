source = ~/.config/hypr/conf.d/colors.conf
source = ~/.config/hypr/conf.d/wallpaper.conf

$mono = JetBrains Mono Nerd Font
$ui = Inter

general {
    hide_cursor = true
    immediate_render = true
    grace = 0
    disable_loading = false
}

animations {
    enabled = true
    bezier = ease, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 4, ease
    animation = fadeOut, 1, 4, ease
    animation = inputFieldDots, 1, 3, ease
}

background {
    monitor =
    path = $wallpaper
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 1.0
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.1
}

# TIME
label {
    monitor =
    text = $TIME
    color = $on_surface
    font_size = 120
    font_family = $ui
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.2)
}

# DATE
label {
    monitor =
    text = cmd[update:60000] echo "<span>$(date +"%A, %d %B")</span>"
    color = $on_surface
    font_size = 22
    font_family = $ui
    position = 0, 80
    halign = center
    valign = center
    opacity = 0.8
}

# GREETING
label {
    monitor =
    text = WELCOME BACK, $USER
    color = $primary
    font_size = 11
    font_family = $mono
    position = 0, -50
    halign = center
    valign = center
    opacity = 0.9
    font_weight = 600
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 64
    outline_thickness = 3
    dots_size = 0.24
    dots_spacing = 0.4
    dots_center = true
    outer_color = $primary
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = $on_surface
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    hide_input = false
    rounding = 32
    check_color = $primary
    fail_color = rgb(ffb4ab)
    fail_text = <i>$PAMFAIL</i>
    position = 0, -120
    halign = center
    valign = center
}

# LOCK ICON
label {
    monitor =
    text = <span font_family='JetBrainsMono Nerd Font'>  </span>
    color = $on_surface
    font_size = 18
    font_family = $mono
    position = 0, 30
    halign = center
    valign = bottom
    opacity = 0.4
}
